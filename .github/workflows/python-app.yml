# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglu1-mesa
        python -m pip install --upgrade pip
        pip install flake8 pytest
        # Install the package from pyproject.toml so its declared runtime
        # dependencies (the canonical list) are always present — avoids drift
        # between pyproject.toml and requirements.txt.
        pip install .
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --statistics
    - name: Test with pytest
      run: |
        # Solver tests self-skip when ngsolve/gmsh are unavailable, and the
        # wakefield tests skip off-Windows (ABCI.exe is a Windows binary).
        pytest tests/ -q
