name: Deploy docs

# The docs are a Sphinx project (docs/source/conf.py, sphinx-immaterial theme),
# NOT a Jupyter Book: there is no docs/_config.yml or docs/_toc.yml, so the old
# `jupyter-book build` step could never have built them. Build with sphinx.
#
# Example notebooks under docs/source/examples/ are committed WITH their outputs
# and are not executed here (nb_execution_mode = 'off' in conf.py): they need
# NGSolve + gmsh and one of them solves 900 eigenmodes. Re-run them locally and
# commit the result when the library changes.

on:
  push:
    branches:
      - master
  # allow a manual run from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install the package and its docs dependencies
        # autodoc imports cavsim2d, so the runtime deps must be installed too.
        run: pip install ".[docs]"

      - name: Build the docs
        run: sphinx-build -b html docs/source docs/_build/html --keep-going

      - name: Deploy to GitHub Pages
        # only publish from the default branch, not from manual test runs on forks
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
