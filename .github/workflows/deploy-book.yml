name: Deploy Jupyter Book

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Jupyter Book and the package
        # The book's autodoc and executed notebooks import cavsim2d, so its
        # runtime dependencies (from pyproject.toml) must be installed too —
        # otherwise the build fails with ModuleNotFoundError (e.g. termcolor).
        run: |
          pip install "jupyter-book>=1"
          pip install .

      - name: Build the book
        working-directory: docs
        run: jupyter-book build --html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html